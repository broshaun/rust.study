name: Android Build (Tauri v2 in subdir app2)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app2/package-lock.json

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK + Build Tools
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install frontend deps
        run: npm ci

      # 关键：子目录里生成 android 工程（你没有本地环境就让 CI 做）
      - name: Tauri Android Init (CI)
        run: npx tauri android init

      # 可选：如果你的 tauri build 不会自动触发前端构建，就保留
      - name: Web Build
        run: npm run build --if-present

      - name: Build APK
        run: npx tauri android build --apk

      - name: Build AAB
        run: npx tauri android build --aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-app2
          path: |
            app2/src-tauri/gen/android/app/build/outputs/apk/**/*
            app2/src-tauri/gen/android/app/build/outputs/bundle/**/*
