name: Tauri2 iOS Build

on:
  workflow_dispatch:
  push:
    tags:
      - "ios-v*"

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ios:
    runs-on: macos-latest

    env:
      NODE_VERSION: "24"
      WORKING_DIR: "chatly"
      APP_NAME: "Chatly"   # 改成你实际的 app 名称（生成 IPA 文件名会用到）

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
          package_json_file: ${{ env.WORKING_DIR }}/package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ${{ env.WORKING_DIR }}/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Verify toolchain
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -euxo pipefail
          node -v
          npm -v
          pnpm -v
          rustc -V
          cargo -V
          xcodebuild -version

      - name: Install frontend dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -euxo pipefail
          pnpm config set registry https://registry.npmmirror.com
          pnpm install --frozen-lockfile

      - name: Initialize iOS project if needed
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -euxo pipefail
          if [ ! -d "src-tauri/gen/apple" ]; then
            pnpm tauri ios init
          fi

      # 这里假设你已经在 Xcode 工程中配置好自动签名
      # 或者你会额外导入证书/描述文件
      - name: Build iOS IPA
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -euxo pipefail
          pnpm tauri ios build --export-method app-store-connect

      - name: Find IPA
        id: ipa
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -euxo pipefail
          IPA_PATH=$(find src-tauri/gen/apple/build -type f -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "❌ IPA NOT FOUND"
            find src-tauri/gen/apple/build -type f | sed -n '1,200p'
            exit 1
          fi
          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"
          echo "Found IPA: $IPA_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatly-ios-ipa
          path: ${{ env.WORKING_DIR }}/${{ steps.ipa.outputs.ipa_path }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.WORKING_DIR }}/${{ steps.ipa.outputs.ipa_path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 可选：自动上传到 App Store Connect / TestFlight
      - name: Upload to App Store Connect
        if: ${{ false }}
        working-directory: ${{ env.WORKING_DIR }}
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euxo pipefail
          xcrun altool --upload-app \
            --type ios \
            --file "${{ steps.ipa.outputs.ipa_path }}" \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER"