name: Tauri2 Raspberry Pi Build

on:
  workflow_dispatch:
  push:
    tags:
      - "rpi-v*"
      - "all-v*"

concurrency:
  group: rpi-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  raspberrypi:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: "20"
      WORKING_DIR: "chatly"
      TARGET: aarch64-unknown-linux-gnu

      # 关键：给 gtk/glib/pkg-config 跨编译用
      PKG_CONFIG_ALLOW_CROSS: "1"
      PKG_CONFIG_SYSROOT_DIR: "/"
      PKG_CONFIG_PATH: "/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
      PKG_CONFIG_LIBDIR: "/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig"

      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: "aarch64-linux-gnu-gcc"

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Enable arm64 architecture
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt update

      - name: Install cross toolchain
        run: |
          sudo apt install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            pkg-config \
            patchelf \
            curl \
            wget \
            file

      - name: Install arm64 system libraries
        run: |
          sudo apt install -y \
            libgtk-3-dev:arm64 \
            libwebkit2gtk-4.1-dev:arm64 \
            libayatana-appindicator3-dev:arm64 \
            librsvg2-dev:arm64 \
            libssl-dev:arm64

      - name: Configure cargo linker
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Install frontend dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install
          npm install -D @tauri-apps/cli@^2
          npm pkg set scripts.tauri="tauri"

      - name: Build Raspberry Pi deb
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ${{ env.WORKING_DIR }}
          tagName: ${{ github.ref_name }}
          releaseName: "Chatly ${{ github.ref_name }}"
          releaseBody: "Raspberry Pi ARM64 build"
          releaseDraft: false
          prerelease: false
          args: --target aarch64-unknown-linux-gnu --bundles deb