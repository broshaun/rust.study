name: Tauri2 RaspberryPi Build

on:
  workflow_dispatch:
  push:
    tags:
      - "rspi-v*"

concurrency:
  group: rpi-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  raspberrypi:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: "20"
      WORKING_DIR: "chatly"
      TARGET: aarch64-unknown-linux-gnu

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross compile toolchain
        run: |
          sudo apt update
          sudo apt install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Install system dependencies
        run: |
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            file \
            curl \
            wget

      - name: Install frontend dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install
          npm install -D @tauri-apps/cli@^2
          npm pkg set scripts.tauri="tauri"

      - name: Build Raspberry Pi packages
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        with:
          projectPath: ${{ env.WORKING_DIR }}
          tagName: ${{ github.ref_name }}
          releaseName: "Chatly ${{ github.ref_name }}"
          releaseBody: "Raspberry Pi ARM64 build"
          releaseDraft: false
          prerelease: false
          args: --target aarch64-unknown-linux-gnu --bundles deb,appimage