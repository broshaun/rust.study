name: Tauri2 Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - "windows-v*"

concurrency:
  group: win-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    env:
      NODE_VERSION: "20"
      WORKING_DIR: "chatly"

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ${{ env.WORKING_DIR }}/pnpm-lock.yaml

      # ✅ 关键修复
      - name: Install pnpm globally
        run: |
          set -euxo pipefail
          npm install -g pnpm@9.12.3
          pnpm -v

      - name: Install frontend dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -euxo pipefail
          pnpm config set registry https://registry.npmmirror.com
          pnpm install --frozen-lockfile

      - name: Build Windows app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ${{ env.WORKING_DIR }}
          tagName: ${{ github.ref_name }}
          releaseName: "Chatly ${{ github.ref_name }}"
          releaseBody: "Windows build for ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc --bundles msi