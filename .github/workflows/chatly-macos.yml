name: Tauri2 macOS Build

on:
  workflow_dispatch:
  push:
    tags:
      - "macos-v*"

concurrency:
  group: mac-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos:
    runs-on: macos-latest

    env:
      NODE_VERSION: "24"
      WORKING_DIR: "chatly"

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
          package_json_file: ${{ env.WORKING_DIR }}/package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: ${{ env.WORKING_DIR }}/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Verify toolchain
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -euxo pipefail
          node -v
          npm -v
          pnpm -v
          rustc -V
          cargo -V

      - name: Install frontend dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -euxo pipefail
          pnpm config set registry https://registry.npmmirror.com
          pnpm install --frozen-lockfile

      - name: Build macOS universal app + dmg
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ${{ env.WORKING_DIR }}
          tagName: ${{ github.ref_name }}
          releaseName: "Chatly ${{ github.ref_name }}"
          releaseBody: |
            macOS universal build for ${{ github.ref_name }}

            Please download the DMG or app bundle below.
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin --bundles app,dmg