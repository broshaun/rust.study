name: Tauri2 Android Build (cargo)

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatly

    env:
      NODE_VERSION: "20"
      JAVA_VERSION: "17"
      PNPM_VERSION: "9"
      ANDROID_NDK_VERSION: "29.0.14206865"
      BUILD_TOOLS_VERSION: "34.0.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Android targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            chatly/src-tauri -> target

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;${BUILD_TOOLS_VERSION}" \
            "cmake;3.22.1" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store path
        id: pnpm-store
        if: hashFiles('chatly/pnpm-lock.yaml') != ''
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        if: hashFiles('chatly/pnpm-lock.yaml') != ''
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('chatly/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install frontend deps
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Build frontend
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm build
          elif [ -f package.json ]; then
            npm run build
          fi

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Init Android (if missing)
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            cargo tauri android init
          fi

      - name: Build Android (APK - universal)
        run: cargo tauri android build --apk --target universal

      - name: Locate & Rename APK
        id: apk
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          APK_DIR="src-tauri/gen/android/app/build/outputs/apk/universal/release"
          ls -la "$APK_DIR"

          APK_SRC="$(ls -1 "$APK_DIR"/*.apk | head -n 1)"
          APK_DST="$APK_DIR/chatly-${TAG}-universal-unsigned.apk"

          mv "$APK_SRC" "$APK_DST"
          test -f "$APK_DST"

          echo "unsigned_apk=$APK_DST" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # ===== 签名开始 =====

      - name: Decode keystore (self-check)
        run: |
          set -euo pipefail
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.jks
          test -s /tmp/release.jks

          # 列出 alias（不会泄露私钥）
          keytool -list -keystore /tmp/release.jks -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" | head -n 30

      - name: Zipalign
        id: align
        run: |
          set -euo pipefail
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS_VERSION}"
          test -x "$BUILD_TOOLS/zipalign"
          test -x "$BUILD_TOOLS/apksigner"

          UNSIGNED="chatly/${{ steps.apk.outputs.unsigned_apk }}"
          ALIGNED="${UNSIGNED%.apk}-aligned.apk"

          "$BUILD_TOOLS/zipalign" -f -p 4 "$UNSIGNED" "$ALIGNED"
          test -f "$ALIGNED"

          echo "aligned_apk=$ALIGNED" >> $GITHUB_OUTPUT

      - name: Sign APK (apksigner)
        id: sign
        run: |
          set -euo pipefail
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS_VERSION}"
          ALIGNED="${{ steps.align.outputs.aligned_apk }}"

          TAG="${{ steps.apk.outputs.tag }}"
          SIGNED="chatly/src-tauri/gen/android/app/build/outputs/apk/universal/release/chatly-${TAG}-universal-signed.apk"

          "$BUILD_TOOLS/apksigner" sign \
            --ks /tmp/release.jks \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out "$SIGNED" \
            "$ALIGNED"

          "$BUILD_TOOLS/apksigner" verify --verbose "$SIGNED"
          echo "signed_apk=$SIGNED" >> $GITHUB_OUTPUT

      - name: Upload signed APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.sign.outputs.signed_apk }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}