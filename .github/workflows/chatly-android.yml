name: Tauri2 Android Build (Optimized)

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "20"
      JAVA_VERSION: "17"
      PNPM_VERSION: "9"
      ANDROID_NDK_VERSION: "26.1.10909125" # Tauri 2.0 推荐的稳定版本
      BUILD_TOOLS_VERSION: "34.0.0"
      WORKING_DIR: "chatly"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Cache Rust & Build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "${{ env.WORKING_DIR }}/src-tauri -> target"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK & Tools
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;${{ env.BUILD_TOOLS_VERSION }}" "ndk;${{ env.ANDROID_NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      - name: Setup Node & pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: pnpm install --frozen-lockfile

      - name: Sync Version from Tag
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#android-v}
          echo "Updating tauri.conf.json to version $TAG_VERSION"
          sed -i "s/\"version\": \".*\"/\"version\": \"$TAG_VERSION\"/" src-tauri/tauri.conf.json

      - name: Build Android (APK)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # 自动安装 tauri-cli 并编译
          pnpm tauri android build --apk --release
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Prepare Signing
        id: prepare
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # 定位生成的 APK (Tauri 2.0 通常在 gen/android 下)
          APK_SRC=$(find src-tauri/gen/android -name "*.apk" | grep "release" | head -n 1)
          if [ -z "$APK_SRC" ]; then echo "❌ APK not found"; exit 1; fi
          
          echo "unsigned_apk=$GITHUB_WORKSPACE/${{ env.WORKING_DIR }}/$APK_SRC" >> $GITHUB_OUTPUT
          
          # 准备 KeyStore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.jks

      - name: Zipalign & Sign APK
        id: sign
        run: |
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${{ env.BUILD_TOOLS_VERSION }}"
          UNSIGNED="${{ steps.prepare.outputs.unsigned_apk }}"
          
          mkdir -p ${{ env.WORKING_DIR }}/dist
          ALIGNED="/tmp/aligned.apk"
          SIGNED_APK="${{ env.WORKING_DIR }}/dist/chatly-${{ github.ref_name }}.apk"

          # 对齐
          "$BUILD_TOOLS/zipalign" -v -p 4 "$UNSIGNED" "$ALIGNED"

          # 签名
          "$BUILD_TOOLS/apksigner" sign \
            --ks /tmp/release.jks \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out "$SIGNED_APK" \
            "$ALIGNED"

          echo "signed_apk=$SIGNED_APK" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatly-android-release
          path: ${{ steps.sign.outputs.signed_apk }}
          retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.sign.outputs.signed_apk }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}