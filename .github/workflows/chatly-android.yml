name: Tauri2 Android Build (Stable Fixed)

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "20"
      JAVA_VERSION: "17"
      NDK_VER: "26.1.10909125"
      BUILD_TOOLS_VER: "34.0.0"
      WORKING_DIR: "chatly"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Purge old NDK and install Android packages
        shell: bash
        run: |
          set -euxo pipefail

          echo "Purging old NDKs..."
          rm -rf "$ANDROID_SDK_ROOT/ndk" || true
          rm -rf "$ANDROID_SDK_ROOT/ndk-bundle" || true

          echo "Accepting Android SDK licenses..."
          set +o pipefail
          yes | sdkmanager --licenses > /dev/null
          set -o pipefail

          echo "Installing required Android packages..."
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;${{ env.BUILD_TOOLS_VER }}" \
            "ndk;${{ env.NDK_VER }}"

          NDK_PATH="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VER }}"
          echo "NDK_HOME=$NDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> "$GITHUB_ENV"
          echo "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "$GITHUB_PATH"

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "Using NDK at $NDK_PATH"
          test -d "$NDK_PATH"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack and activate pnpm
        shell: bash
        run: |
          set -euxo pipefail

          corepack enable
          corepack prepare pnpm@9.12.3 --activate

          node -v
          npm -v
          pnpm -v

      - name: Install frontend dependencies
        shell: bash
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -euxo pipefail

          pnpm config set registry https://registry.npmmirror.com
          pnpm install --frozen-lockfile

          # 如果 package.json 里本来已经有 @tauri-apps/cli，可删除下面这行
          pnpm add -D @tauri-apps/cli@^2

      - name: Verify project files
        shell: bash
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -euxo pipefail

          test -f package.json
          test -d src-tauri

          echo "==== package.json scripts ===="
          node -e "const p=require('./package.json'); console.log(p.scripts || {})"

          echo "==== tauri config exists ===="
          ls -la src-tauri | sed -n '1,120p'

      - name: Clean and initialize Android project
        shell: bash
        working-directory: ${{ env.WORKING_DIR }}
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          set -euxo pipefail

          if [ -d "src-tauri/gen/android" ]; then
            echo "Detected existing Android project, cleaning it to prevent path bleeding..."
            rm -rf src-tauri/gen/android
          fi

          echo "Initializing fresh Android project..."
          pnpm tauri android init --ci

      - name: Build Android APK
        shell: bash
        working-directory: ${{ env.WORKING_DIR }}
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          set -euxo pipefail

          pnpm tauri android build --apk

      - name: Find release APK
        id: apk
        shell: bash
        run: |
          set -euxo pipefail

          APK_SRC=$(find "${{ env.WORKING_DIR }}/src-tauri/gen/android" -type f -name "*.apk" | grep "release" | head -n 1)
          if [ -z "$APK_SRC" ]; then
            echo "❌ APK NOT FOUND"
            find "${{ env.WORKING_DIR }}/src-tauri/gen/android" -type f | sed -n '1,200p'
            exit 1
          fi

          echo "apk_path=$APK_SRC" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK_SRC"

      - name: Sign APK
        id: sign
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p dist
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.jks

          BT="$ANDROID_SDK_ROOT/build-tools/${{ env.BUILD_TOOLS_VER }}"
          UNSIGNED_APK="${{ steps.apk.outputs.apk_path }}"
          SIGNED_APK="dist/chatly-${{ github.ref_name }}.apk"

          "$BT/zipalign" -f -p 4 "$UNSIGNED_APK" /tmp/aligned.apk

          "$BT/apksigner" sign \
            --ks /tmp/release.jks \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out "$SIGNED_APK" \
            /tmp/aligned.apk

          "$BT/apksigner" verify "$SIGNED_APK"

          echo "signed_apk=$SIGNED_APK" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatly-android-apk
          path: ${{ steps.sign.outputs.signed_apk }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign.outputs.signed_apk }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}