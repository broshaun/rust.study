name: Tauri2 Android Build (cargo)

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatly

    env:
      NODE_VERSION: "20"
      JAVA_VERSION: "17"
      PNPM_VERSION: "9"
      ANDROID_NDK_VERSION: "29.0.14206865"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Android targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            chatly/src-tauri -> target

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "cmake;3.22.1" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('chatly/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install frontend deps
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Build frontend
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm build
          elif [ -f package.json ]; then
            npm run build
          fi

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Init Android (if missing)
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            cargo tauri android init
          fi

      - name: Build Android (APK)
        run: cargo tauri android build --apk

      # ✅ 关键修复：强制失败即停 + 列目录 + 写出最终产物路径
      - name: Locate & Rename APK
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          APK_DIR="src-tauri/gen/android/app/build/outputs/apk/universal/release"

          echo "Listing APK dir: $APK_DIR"
          ls -la "$APK_DIR"

          APK_SRC="$(ls -1 "$APK_DIR"/*.apk | head -n 1)"
          APK_DST="$APK_DIR/chatly-${TAG}.apk"

          echo "APK_SRC=$APK_SRC"
          echo "APK_DST=$APK_DST"

          mv "$APK_SRC" "$APK_DST"
          test -f "$APK_DST"

          echo "APK_REL=$APK_DST" >> $GITHUB_ENV

      # ✅ 关键修复：uses 步骤按仓库根路径，所以要加 chatly/ 前缀
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chatly-android-${{ github.ref_name }}
          retention-days: 7
          if-no-files-found: error
          path: |
            chatly/${{ env.APK_REL }}

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            chatly/${{ env.APK_REL }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}