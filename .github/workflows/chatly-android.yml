name: Tauri2 Android Build (No-Cache Clean Build)

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"
      - "all-v*"

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "20"
      JAVA_VERSION: "17"
      NDK_VER: "26.1.10909125"
      BUILD_TOOLS_VER: "34.0.0"
      WORKING_DIR: "chatly"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Purge Old NDK & Install Correct One
        run: |
          set -euo pipefail
          # 💡 核心修复 1：物理删除系统所有 NDK，不给 Gradle 留任何漂移机会
          echo "Purging all existing NDKs..."
          rm -rf "$ANDROID_SDK_ROOT/ndk" || true
          rm -rf "$ANDROID_SDK_ROOT/ndk-bundle" || true
          
          # 安装指定的 26.1 版本
          sdkmanager "ndk;${{ env.NDK_VER }}" "build-tools;${{ env.BUILD_TOOLS_VER }}" "platforms;android-34"

          NDK_PATH="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VER }}"
          echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}


      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install
          npm install -D @tauri-apps/cli@2
          npm pkg set scripts.tauri="tauri"

      - name: Clean & Build Android
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # 💡 核心修复 2：如果目录已存在（可能来自错误的缓存），先删掉重建
          if [ -d "src-tauri/gen/android" ]; then
            echo "Detected existing Android project, cleaning it to prevent path bleeding..."
            rm -rf src-tauri/gen/android
          fi
          
          echo "Initializing fresh Android project..."
          npx tauri android init --ci
          
          # 执行编译
          npx tauri android build --apk
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Sign APK
        id: sign
        run: |
          APK_SRC=$(find ${{ env.WORKING_DIR }}/src-tauri/gen/android -name "*.apk" | grep "release" | head -n 1)
          if [ -z "$APK_SRC" ]; then echo "❌ APK NOT FOUND"; exit 1; fi
          
          mkdir -p dist
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.jks
          
          BT="$ANDROID_SDK_ROOT/build-tools/${{ env.BUILD_TOOLS_VER }}"
          SIGNED="dist/chatly-${{ github.ref_name }}.apk"

          "$BT/zipalign" -f -p 4 "$APK_SRC" /tmp/aligned.apk
          "$BT/apksigner" sign \
            --ks /tmp/release.jks \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out "$SIGNED" \
            /tmp/aligned.apk

          echo "signed_apk=$SIGNED" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign.outputs.signed_apk }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}