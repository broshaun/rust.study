name: Tauri2 Android Build (cargo)

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatly

    env:
      NODE_VERSION: "20"
      JAVA_VERSION: "17"
      PNPM_VERSION: "9"
      ANDROID_NDK_VERSION: "29.0.14206865"
      BUILD_TOOLS_VERSION: "34.0.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Android targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            chatly/src-tauri -> target

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;${BUILD_TOOLS_VERSION}" \
            "cmake;3.22.1" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # ✅ 环境预检：提前发现 SDK/Build-tools/Secrets 问题（省时间、省额度）
      - name: Environment Preflight Check
        run: |
          set -euo pipefail

          echo "===== Java ====="
          java -version

          echo "===== Rust ====="
          rustc --version
          cargo --version

          echo "===== Node / pnpm ====="
          node --version || true

          echo "===== Android SDK ====="
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"

          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS_VERSION}"
          echo "BUILD_TOOLS=$BUILD_TOOLS"
          ls -la "$BUILD_TOOLS"

          echo "===== Check zipalign / apksigner ====="
          test -x "$BUILD_TOOLS/zipalign" || (echo "❌ zipalign not found!" && exit 1)
          test -x "$BUILD_TOOLS/apksigner" || (echo "❌ apksigner not found!" && exit 1)

          echo "===== Check keystore secrets present (length only) ====="
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "❌ ANDROID_KEYSTORE_BASE64 not set!"
            exit 1
          fi
          if [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then
            echo "❌ ANDROID_KEYSTORE_PASSWORD not set!"
            exit 1
          fi
          if [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ]; then
            echo "❌ ANDROID_KEY_ALIAS not set!"
            exit 1
          fi
          if [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ]; then
            echo "❌ ANDROID_KEY_PASSWORD not set!"
            exit 1
          fi

          echo "===== Preflight OK ✅ ====="

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store path
        id: pnpm-store
        if: hashFiles('chatly/pnpm-lock.yaml') != ''
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        if: hashFiles('chatly/pnpm-lock.yaml') != ''
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('chatly/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install frontend deps
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Build frontend
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm build
          elif [ -f package.json ]; then
            npm run build
          fi

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Init Android (if missing)
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            cargo tauri android init
          fi

      # ✅ 注意：tauri android 的 --target 不支持 universal
      # ✅ 默认构建会由 Gradle 产出 universal APK（你之前日志已验证）
      - name: Build Android (APK)
        run: cargo tauri android build --apk

      - name: Locate & Rename APK
        id: apk
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          # ✅ 兼容未来路径变化：universal / arm64-v8a（至少能找到一个）
          CANDIDATES=(
            "src-tauri/gen/android/app/build/outputs/apk/universal/release"
            "src-tauri/gen/android/app/build/outputs/apk/arm64-v8a/release"
            "src-tauri/gen/android/app/build/outputs/apk/release"
          )

          APK_SRC=""
          APK_DIR=""
          for d in "${CANDIDATES[@]}"; do
            if [ -d "$d" ] && ls -1 "$d"/*.apk >/dev/null 2>&1; then
              APK_DIR="$d"
              APK_SRC="$(ls -1 "$d"/*.apk | head -n 1)"
              break
            fi
          done

          if [ -z "$APK_SRC" ]; then
            echo "❌ No APK found. Listing outputs for debug:"
            ls -R "src-tauri/gen/android/app/build/outputs/apk" || true
            exit 1
          fi

          echo "✅ Found APK: $APK_SRC"
          echo "✅ In dir: $APK_DIR"
          ls -la "$APK_DIR"

          APK_DST="$APK_DIR/chatly-${TAG}-unsigned.apk"
          mv "$APK_SRC" "$APK_DST"
          test -f "$APK_DST"

          echo "unsigned_apk=$APK_DST" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # ===== 签名开始 =====

      - name: Decode keystore + verify alias
        run: |
          set -euo pipefail
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.jks
          test -s /tmp/release.jks

          echo "===== Keystore aliases (top) ====="
          keytool -list -keystore /tmp/release.jks -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" | head -n 60

          # ✅ 校验 alias 存在（避免签名到一半才报错）
          keytool -list -keystore /tmp/release.jks -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            | grep -F "${{ secrets.ANDROID_KEY_ALIAS }}" >/dev/null \
            || (echo "❌ Alias '${{ secrets.ANDROID_KEY_ALIAS }}' not found in keystore!" && exit 1)

          echo "Alias verified ✅"

      - name: Zipalign
        id: align
        run: |
          set -euo pipefail
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS_VERSION}"
          UNSIGNED="chatly/${{ steps.apk.outputs.unsigned_apk }}"
          ALIGNED="${UNSIGNED%.apk}-aligned.apk"

          "$BUILD_TOOLS/zipalign" -f -p 4 "$UNSIGNED" "$ALIGNED"
          test -f "$ALIGNED"

          echo "aligned_apk=$ALIGNED" >> $GITHUB_OUTPUT

      - name: Sign APK (apksigner)
        id: sign
        run: |
          set -euo pipefail
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS_VERSION}"
          ALIGNED="${{ steps.align.outputs.aligned_apk }}"

          TAG="${{ steps.apk.outputs.tag }}"
          SIGNED_DIR="$(dirname "$ALIGNED")"
          SIGNED="$SIGNED_DIR/chatly-${TAG}-signed.apk"

          "$BUILD_TOOLS/apksigner" sign \
            --ks /tmp/release.jks \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out "$SIGNED" \
            "$ALIGNED"

          "$BUILD_TOOLS/apksigner" verify --verbose "$SIGNED"
          echo "signed_apk=$SIGNED" >> $GITHUB_OUTPUT

      - name: Upload signed APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.sign.outputs.signed_apk }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}