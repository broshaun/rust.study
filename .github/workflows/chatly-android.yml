name: Tauri2 Android Build (cargo)

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatly

    env:
      NODE_VERSION: "20"
      JAVA_VERSION: "17"
      PNPM_VERSION: "9"
      ANDROID_NDK_VERSION: "29.0.14206865"
      BUILD_TOOLS_VERSION: "34.0.0"
      GRADLE_USER_HOME: /home/runner/.gradle

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Android targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            chatly/src-tauri -> target

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          set -euo pipefail
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;${BUILD_TOOLS_VERSION}" \
            "cmake;3.22.1" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Cache Gradle (wrapper + caches)
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/.gradle/caches
            /home/runner/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('chatly/src-tauri/gen/android/**/gradle-wrapper.properties', 'chatly/src-tauri/gen/android/**/*.gradle*', 'chatly/src-tauri/gen/android/**/settings.gradle*', 'chatly/src-tauri/gen/android/**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Environment Preflight Check
        run: |
          set -euo pipefail

          echo "===== OS ====="
          uname -a

          echo "===== Java ====="
          java -version

          echo "===== Rust ====="
          rustc --version
          cargo --version

          echo "===== Android SDK ====="
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"

          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS_VERSION}"
          echo "BUILD_TOOLS=$BUILD_TOOLS"
          ls -la "$BUILD_TOOLS"

          test -x "$BUILD_TOOLS/zipalign" || (echo "❌ zipalign not found!" && exit 1)
          test -x "$BUILD_TOOLS/apksigner" || (echo "❌ apksigner not found!" && exit 1)

          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" || (echo "❌ ANDROID_KEYSTORE_BASE64 not set!" && exit 1)
          test -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" || (echo "❌ ANDROID_KEYSTORE_PASSWORD not set!" && exit 1)
          test -n "${{ secrets.ANDROID_KEY_ALIAS }}" || (echo "❌ ANDROID_KEY_ALIAS not set!" && exit 1)
          test -n "${{ secrets.ANDROID_KEY_PASSWORD }}" || (echo "❌ ANDROID_KEY_PASSWORD not set!" && exit 1)

          echo "===== Preflight OK ✅ ====="

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store path
        id: pnpm-store
        if: hashFiles('chatly/pnpm-lock.yaml') != ''
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        if: hashFiles('chatly/pnpm-lock.yaml') != ''
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('chatly/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install frontend deps
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Build frontend
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            pnpm build
          elif [ -f package.json ]; then
            npm run build
          fi

      - name: Install tauri-cli (skip if exists)
        run: |
          set -euo pipefail
          if ! command -v cargo-tauri >/dev/null 2>&1 && ! command -v tauri >/dev/null 2>&1; then
            cargo install tauri-cli --locked
          fi

      - name: Init Android (if missing)
        run: |
          set -euo pipefail
          if [ ! -d "src-tauri/gen/android" ]; then
            cargo tauri android init
          fi

      - name: Build Android (APK)
        run: |
          set -euo pipefail
          cargo tauri android build --apk

      - name: Locate & Rename APK
        id: apk
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          CANDIDATE_DIRS=(
            "src-tauri/gen/android/app/build/outputs/apk/universal/release"
            "src-tauri/gen/android/app/build/outputs/apk/arm64-v8a/release"
            "src-tauri/gen/android/app/build/outputs/apk/release"
          )

          APK_SRC=""
          APK_DIR=""
          for d in "${CANDIDATE_DIRS[@]}"; do
            if [ -d "$d" ] && ls -1 "$d"/*.apk >/dev/null 2>&1; then
              APK_DIR="$d"
              APK_SRC="$(ls -1 "$d"/*.apk | head -n 1)"
              break
            fi
          done

          if [ -z "$APK_SRC" ]; then
            echo "⚠️ Not found in candidate dirs, using find..."
            APK_SRC="$(find "src-tauri/gen/android/app/build/outputs/apk" -type f -name "*.apk" | head -n 1 || true)"
            APK_DIR="$(dirname "$APK_SRC" 2>/dev/null || true)"
          fi

          if [ -z "$APK_SRC" ] || [ ! -f "$APK_SRC" ]; then
            echo "❌ No APK found. Listing outputs for debug:"
            ls -R "src-tauri/gen/android/app/build/outputs/apk" || true
            exit 1
          fi

          echo "✅ Found APK: $APK_SRC"
          echo "✅ In dir: $APK_DIR"
          ls -la "$APK_DIR"

          APK_DST="$APK_DIR/chatly-${TAG}-unsigned.apk"
          mv "$APK_SRC" "$APK_DST"
          test -f "$APK_DST"

          file "$APK_DST"
          unzip -t "$APK_DST" >/dev/null

          echo "unsigned_apk=$APK_DST" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Decode keystore + verify alias
        run: |
          set -euo pipefail
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.jks
          test -s /tmp/release.jks

          keytool -list -keystore /tmp/release.jks -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" | head -n 60

          keytool -list -keystore /tmp/release.jks -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            | grep -F "${{ secrets.ANDROID_KEY_ALIAS }}" >/dev/null \
            || (echo "❌ Alias '${{ secrets.ANDROID_KEY_ALIAS }}' not found in keystore!" && exit 1)

      - name: Zipalign + Sign APK (apksigner) -> dist/
        id: sign
        run: |
          set -euo pipefail
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS_VERSION}"

          UNSIGNED="${{ steps.apk.outputs.unsigned_apk }}"
          TAG="${{ steps.apk.outputs.tag }}"

          mkdir -p dist

          ALIGNED="${UNSIGNED%.apk}-aligned.apk"
          "$BUILD_TOOLS/zipalign" -f -p 4 "$UNSIGNED" "$ALIGNED"
          test -f "$ALIGNED"
          unzip -t "$ALIGNED" >/dev/null

          SIGNED="dist/chatly-${TAG}-signed.apk"

          "$BUILD_TOOLS/apksigner" sign \
            --ks /tmp/release.jks \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out "$SIGNED" \
            "$ALIGNED"

          "$BUILD_TOOLS/apksigner" verify --verbose "$SIGNED"
          test -f "$SIGNED"

          echo "signed_apk=$SIGNED" >> $GITHUB_OUTPUT

      - name: Verify dist output
        run: |
          set -euo pipefail
          ls -la dist
          test -f "${{ steps.sign.outputs.signed_apk }}"

      # ✅ 可选：Artifacts（方便 Actions 页面直接下载，不走 Release）
      - name: Upload artifacts (dist)
        uses: actions/upload-artifact@v4
        with:
          name: chatly-android-${{ github.ref_name }}
          retention-days: 7
          if-no-files-found: error
          path: |
            chatly/${{ steps.sign.outputs.signed_apk }}

      - name: Upload signed APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            chatly/${{ steps.sign.outputs.signed_apk }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}