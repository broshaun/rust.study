name: Tauri2 Android Build (NDK Forced)

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "20"
      JAVA_VERSION: "17"
      # Tauri 2.0 目前最稳的版本
      NDK_VER: "26.1.10909125"
      BUILD_TOOLS_VER: "34.0.0"
      WORKING_DIR: "chatly"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install & Force NDK Path
        run: |
          # 安装我们需要的版本
          sdkmanager "ndk;${{ env.NDK_VER }}" "build-tools;${{ env.BUILD_TOOLS_VER }}"
          
          # 💡 强制覆盖环境变量
          NDK_PATH="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VER }}"
          echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          
          # 验证
          echo "Using NDK at: $NDK_PATH"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ env.WORKING_DIR }}/package*.json'

      - name: Install Dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          npm config set registry https://registry.npmmirror.com
          npm install
          npm install -D @tauri-apps/cli@2

      - name: Init & Build Android (APK)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # 确保 Android 目录存在
          if [ ! -d "src-tauri/gen/android" ]; then
            npx tauri android init --ci
          fi
          
          # 💡 再次通过命令行参数显式传递，防止 Tauri 漂移到系统 NDK 29
          npx tauri android build --apk
        env:
          # 双重锁死 NDK 路径
          NDK_HOME: ${{ env.NDK_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Sign APK
        id: sign
        run: |
          APK_SRC=$(find ${{ env.WORKING_DIR }}/src-tauri/gen/android -name "*.apk" | grep "release" | head -n 1)
          if [ -z "$APK_SRC" ]; then echo "❌ APK NOT FOUND"; exit 1; fi
          
          mkdir -p dist
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.jks
          
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${{ env.BUILD_TOOLS_VER }}"
          SIGNED_APK="dist/chatly-${{ github.ref_name }}.apk"

          "$BUILD_TOOLS/zipalign" -v -p 4 "$APK_SRC" /tmp/aligned.apk
          "$BUILD_TOOLS/apksigner" sign \
            --ks /tmp/release.jks \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out "$SIGNED_APK" \
            /tmp/aligned.apk

          echo "signed_apk=$SIGNED_APK" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign.outputs.signed_apk }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}