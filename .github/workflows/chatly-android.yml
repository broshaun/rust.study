name: Tauri2 Android Build (cargo)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Android targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK & CMake
        run: |
          sdkmanager "ndk;26.1.10909125" "cmake;3.22.1" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: |
          if [ -f package.json ]; then
            corepack enable || true
            if [ -f pnpm-lock.yaml ]; then
              corepack prepare pnpm@9 --activate
              pnpm install --frozen-lockfile
            elif [ -f package-lock.json ]; then
              npm ci
            elif [ -f yarn.lock ]; then
              corepack prepare yarn@stable --activate
              yarn install --frozen-lockfile
            else
              npm install
            fi
          fi

      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Build Android (APK)
        run: cargo tauri android build --apk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-android-artifacts
          path: |
            chatly/src-tauri/gen/android/app/build/outputs/**/*.apk
            chatly/src-tauri/gen/android/app/build/outputs/**/*.aab