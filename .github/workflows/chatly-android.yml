name: Tauri2 Android Build (cnpm/npm Optimized)

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "20"
      JAVA_VERSION: "17"
      ANDROID_NDK_VERSION: "26.1.10909125"
      BUILD_TOOLS_VERSION: "34.0.0"
      WORKING_DIR: "chatly"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          # 💡 不在这里开启缓存，避免扫描子目录失败

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}" "build-tools;${{ env.BUILD_TOOLS_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ env.WORKING_DIR }}/package-lock.json'

      - name: Install Dependencies (cnpm style)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # 在 CI 环境中，使用 npm install 是最稳妥的，它会读取你的 package.json
          # 如果你有 package-lock.json，它会自动按 lock 安装
          npm install

      - name: Sync Version
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#android-v}
          # 鲁棒性：如果不存在文件则跳过
          if [ -f "src-tauri/tauri.conf.json" ]; then
            sed -i "s/\"version\": \".*\"/\"version\": \"$TAG_VERSION\"/" src-tauri/tauri.conf.json
          fi

      - name: Build Android (APK)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # 使用 npx 直接运行 tauri，无需全局安装
          npx tauri android build --apk --release
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Sign APK
        id: sign
        run: |
          # 自动寻找生成的 APK
          APK_SRC=$(find ${{ env.WORKING_DIR }}/src-tauri/gen/android -name "*.apk" | grep "release" | head -n 1)
          if [ -z "$APK_SRC" ]; then echo "❌ APK not found"; exit 1; fi
          
          mkdir -p dist
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.jks
          
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/${{ env.BUILD_TOOLS_VERSION }}"
          SIGNED_APK="dist/chatly-${{ github.ref_name }}.apk"

          # 对齐
          "$BUILD_TOOLS/zipalign" -v -p 4 "$APK_SRC" /tmp/aligned.apk
          
          # 签名
          "$BUILD_TOOLS/apksigner" sign \
            --ks /tmp/release.jks \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out "$SIGNED_APK" \
            /tmp/aligned.apk

          echo "signed_apk=$SIGNED_APK" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign.outputs.signed_apk }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}