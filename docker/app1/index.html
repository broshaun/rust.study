<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    <!-- 禁止缩放 -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />

    <title>App</title>

    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        overflow: hidden;               /* 禁止页面滚动 */
        overscroll-behavior: none;      /* 禁止弹性回弹 */
        -webkit-touch-callout: none;    /* 禁止长按菜单 */
        -webkit-tap-highlight-color: transparent;
      }

      #root {
        height: 100%;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
