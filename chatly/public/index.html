<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <title>Chatly</title>

  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self' tauri://localhost; 
    script-src 'self' 'unsafe-inline'; 
    style-src 'self' 'unsafe-inline'; 
    img-src 'self' blob: data: tauri://localhost https://tauri.localhost; 
    connect-src 'self' tauri://localhost https://tauri.localhost;
  ">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root {
      /* 自动获取各端安全区：iOS/Android 刘海，或 macOS 标题栏 */
      --safe-area-top: env(safe-area-inset-top, 0px);
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
      --safe-area-left: env(safe-area-inset-left, 0px);
      --safe-area-right: env(safe-area-inset-right, 0px);
    }

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden; /* 核心：禁止 Webview 整体回弹/滚动 */
      overscroll-behavior: none;
      background-color: #ffffff; 
    }

    body {
      /* 提升原生感：禁止长按弹出菜单 & 禁用点击高亮 */
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      font-family: system-ui, -apple-system, sans-serif;
    }

    #root {
      position: fixed; /* 使用 fixed 锁定位置，防止键盘弹出时布局乱掉 */
      inset: 0;
      display: flex;
      flex-direction: column;

      /* 核心布局：根据物理设备自动避开危险区域 */
      padding-top: var(--safe-area-top);
      padding-bottom: var(--safe-area-bottom);
      padding-left: var(--safe-area-left);
      padding-right: var(--safe-area-right);
      
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <div id="root"></div>
</body>

</html>
