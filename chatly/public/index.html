<!DOCTYPE html>
<html lang="zh-CN">

<head>

  <title>Chatly</title>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />



  <style>
    html,
    body,
    #root {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      overflow: hidden;
      overscroll-behavior: none; /* 禁止页面滚动 */
      -webkit-touch-callout: none; /* 禁止弹性回弹 */
      -webkit-tap-highlight-color: transparent; /* 禁止长按菜单 */
    }

    #root {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="root"></div>
</body>

</html>
